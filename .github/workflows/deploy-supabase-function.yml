name: Deploy Supabase Edge Function

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/product-preview/**"
      - ".github/workflows/deploy-supabase-function.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-product-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN secret."
            exit 1
          fi

          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Missing SUPABASE_PROJECT_REF secret."
            exit 1
          fi

      - name: Deploy product-preview function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase functions deploy product-preview \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --no-verify-jwt
